---
layout: default
title: My Blog
---

<h1>오늘의 포스트</h1>
<ul>
  {% assign today = "now" | date: "%Y%m%d" %}
  {% for post in site.posts %}
    {% assign post_date = post.date | date: "%Y%m%d" %}
    {% if post_date == today %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <span>{{ post.date | date: "%H:%M" }}</span>
      </li>
    {% endif %}
  {% endfor %}
</ul>
